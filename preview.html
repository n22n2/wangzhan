    // ============ Hero 首屏（全屏容器 + 光环 + 光斑 + 大号"VFX"标题） ============
    function Hero() {
      const heroRef = React.useRef(null);

      // 鼠标光晕跟随
      React.useEffect(() => {
        const hero = heroRef.current;
        if (!hero) return;
        const onMove = (e) => {
          const rect = hero.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          hero.style.setProperty('--mx', x + '%');
          hero.style.setProperty('--my', y + '%');
          const px = ((e.clientX - rect.left) / rect.width - 0.5) * 20;
          const py = ((e.clientY - rect.top) / rect.height - 0.5) * 20;
          hero.style.setProperty('--px', px + 'px');
          hero.style.setProperty('--py', py + 'px');
        };
        hero.addEventListener('mousemove', onMove);
        return () => hero.removeEventListener('mousemove', onMove);
      }, []);

      return (
        <section className="hero" ref={heroRef}>
          <div className="hero-fallback" aria-hidden="true"></div>
          <div className="hero-orbit hero-orbit-1" aria-hidden="true"></div>

    function ProjectThumb({ src, onClick, title }) {
      const videoRef = React.useRef(null);
      React.useEffect(() => {
        const video = videoRef.current;
        if (!video || !src) return;
        const reveal = () => {
          if (video && !video.classList.contains('is-loaded'))
            video.classList.add('is-loaded');
        };
        if (video.readyState >= 3) reveal();
        video.addEventListener('loadeddata', reveal);
        video.addEventListener('canplay', reveal);
        video.addEventListener('playing', reveal);
        const p = video.play();
        if (p && typeof p.then === 'function')
          p.then(() => reveal()).catch(() => reveal());
        const fb = setTimeout(reveal, 2000);
        return () => {
          video.removeEventListener('loadeddata', reveal);
          video.removeEventListener('canplay', reveal);
          video.removeEventListener('playing', reveal);
          clearTimeout(fb);
        };
      }, [src]);
      return (
        <div className="project-thumb" onClick={onClick} title={'点击播放 · ' + title}>
          <video ref={videoRef} className="project-video" autoPlay muted loop playsInline preload="auto">
            <source src={src} type="video/mp4" />
          </video>
          <div className="project-play">
            <span className="play-icon">▶</span>
            <span className="play-text">点击播放</span>
          </div>
        </div>
      );
    }

    function VideoModal({ project, onClose }) {
      const videoRef = React.useRef(null);
      const modalRef = React.useRef(null);
      const [isPlaying, setIsPlaying] = React.useState(true);

      React.useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.muted = false;
        const tryPlay = () => {
          const p = video.play();
          if (p && typeof p.then === 'function') {
            p.then(() => setIsPlaying(true)).catch(() => {
              video.muted = true;
              video.play().then(() => setIsPlaying(true)).catch(() => {});
            });
          }
        };
        tryPlay();
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, []);

      React.useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.addEventListener('play', () => setIsPlaying(true));
        video.addEventListener('pause', () => setIsPlaying(false));
        return () => {};
      }, []);

      const handleFullscreen = () => {
        const video = videoRef.current;
        if (!video) return;
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        else if (video.msRequestFullscreen) video.msRequestFullscreen();
      };

      const handleBackdropClick = (e) => {
        if (e.target === modalRef.current) onClose();
      };

      return (
        <div className="modal-backdrop" ref={modalRef} onClick={handleBackdropClick}>
          <div className="modal-content">
            <div className="modal-header">
              <div>
                <span className="modal-tag">{project.tag}</span>

              <button className="modal-close" onClick={onClose} aria-label="关闭">✕</button>
            </div>
            <div className="modal-video-wrap">

            </div>
            <div className="modal-actions">

    // ============ App 根组件（全局鼠标交互 + 光标动画 + reveal 淡入） ============
    function App() {
      const dotRef = useRef(null);
      const ringRef = useRef(null);
      const rafRef = useRef(null);
      const posRef = useRef({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
      const ringPosRef = useRef({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const onMove = (e) => {
          posRef.current.x = e.clientX;
          posRef.current.y = e.clientY;
          document.documentElement.style.setProperty('--mx', e.clientX + 'px');
          document.documentElement.style.setProperty('--my', e.clientY + 'px');

          const targets = document.querySelectorAll('[data-spotlight]');
          targets.forEach((el) => {
            const rect = el.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            el.style.setProperty('--rx', x + 'px');
            el.style.setProperty('--ry', y + 'px');
            el.style.setProperty('--sx', x + 'px');
            el.style.setProperty('--sy', y + 'px');
            el.style.setProperty('--ix', x + 'px');
            el.style.setProperty('--iy', y + 'px');
            el.style.setProperty('--px', x + 'px');
            el.style.setProperty('--py', y + 'px');
            el.style.setProperty('--ax', x + 'px');
            el.style.setProperty('--ay', y + 'px');
          });

          const hero = document.querySelector('.hero');
          if (hero) {
            const rect = hero.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            hero.style.setProperty('--hx', x + 'px');
            hero.style.setProperty('--hy', y + 'px');
            hero.style.setProperty('--gx', (x / rect.width - 0.5) * 20 + 'px');
            hero.style.setProperty('--gy', (y / rect.height - 0.5) * 20 + 'px');

          const contact = document.querySelector('.contact');
          if (contact) {
            const rect = contact.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            contact.style.setProperty('--cx', x + 'px');
            contact.style.setProperty('--cy', y + 'px');
          }
        };

        window.addEventListener('mousemove', onMove);

        const animate = () => {
          if (dotRef.current) {
            dotRef.current.style.transform =
              `translate(${posRef.current.x}px, ${posRef.current.y}px) translate(-50%, -50%)`;
          }
          ringPosRef.current.x += (posRef.current.x - ringPosRef.current.x) * 0.18;
          ringPosRef.current.y += (posRef.current.y - ringPosRef.current.y) * 0.18;
          if (ringRef.current) {
            ringRef.current.style.transform =
              `translate(${ringPosRef.current.x}px, ${ringPosRef.current.y}px) translate(-50%, -50%)`;
          }
          rafRef.current = requestAnimationFrame(animate);
        };
        rafRef.current = requestAnimationFrame(animate);

        const interactiveSelector = 'a, button, [data-cursor-hover]';
        const onOver = (e) => {
          if (e.target.closest(interactiveSelector)) {
            document.body.classList.add('cursor-hover');
          }
        };
        const onOut = (e) => {
          if (e.target.closest(interactiveSelector)) {
            document.body.classList.remove('cursor-hover');
          }
        };
        document.addEventListener('mouseover', onOver);
        document.addEventListener('mouseout', onOut);

        const onScroll = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', onScroll, { passive: true });

        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) entry.target.classList.add('is-visible');
            });
          },
          { threshold: 0.12 }
        );
        document.querySelectorAll('.reveal').forEach((el) => io.observe(el));

        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('scroll', onScroll);
          document.removeEventListener('mouseover', onOver);
          document.removeEventListener('mouseout', onOut);
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          io.disconnect();
        };
      }, []);

      return (
        <React.Fragment>
          <div ref={ringRef} className="cursor-ring" aria-hidden="true" />
          <div ref={dotRef} className="cursor-dot" aria-hidden="true" />
          <Navbar scrolled={scrolled} />
          <main>
            <Hero />
            <About />
            <Projects />
            <Advantages />
            <Contact />
          </main>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
